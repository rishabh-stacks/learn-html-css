<style>
  .subscribe-button {
    background-color: rgb(204, 0, 0);
    color: white;
    border: none;
    height: 36px;
    width: 106px;
    border-radius: 2px;
    cursor: pointer;
    margin-right: 10px;
    transition: opacity 0.18s;
  }

  .subscribe-button:hover{
    opacity: 0.75;
  }

  .subscribe-button:active{
    opacity: 0.45;
  }

  .join-button {
    background-color: white;
    color: rgb(6, 95, 212);
    border-color: rgb(6, 95, 212);
    border-style: solid;
    border-width: 1px;
    border-radius: 2px;
    height: 36px;
    width: 62px;
    cursor: pointer;
    transition: background-color 0.18s, color 0.18s;

  }

  .join-button:hover{
    background-color:rgb(6, 95, 212);
    color: white;
  }

  .join-button:active{
    opacity: 0.75;
  }


  .twt-button {
    background-color: rgb(29, 155, 240);
    color: white;
    border: none;
    border-radius: 18px;
    height: 36px;
    width: 80px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
    margin-left: 8px;
    transition: box-shadow 0.18s;
  }

  .twt-button:hover{
    box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.18);
  }
  
  .twt-button:active{
    opacity: 0.75;
  }

</style>

<button class="subscribe-button">
  SUBSCRIBE
</button>

<button class="join-button">
  JOIN
</button>

<button class="twt-button">
  Tweet
</button>
