<style>

  p {
    text-align: center;
    font-family: arial;
    margin-top: 0px;
    margin-bottom: 0px;
  }

  .new {
    color: orange;
    font-size: 10px;
    margin-bottom: 10px;
    font-weight: bold;
  }

  .pro {
    font-weight: bold;
    font-size: 20px;
    margin-bottom: 10px;
  }

  .super {
    font-weight: bolder;
    font-size: 30px;
    margin-bottom: 10px;
  }

  .price {
    font-size: 16px;
    margin-bottom: 20px;
  }

  .buy {
    text-align: center;
    background-color: rgb(24, 90, 205);
    border: none;
    border-radius: 30px;
    padding-bottom: 5px;
    padding-top: 5px;
    padding-left: 10px;
    padding-right: 10px;
    color: white;
    transition: padding 0.15s;
  }

  .buy:hover {
    padding-left: 30px;
    padding-right: 30px;
    cursor: pointer;
  }

</style>




<p class="new">
  New
</p>

<p class="pro">
  Macbook Pro
</p>

<p class="super">
  Supercharged for pros.
</p>

<p class="price">
  From $1999/-
</p>

<p>
  <span class="buy">Buy Now</span>
</p>
